<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>毛雨晴 · 个人主页与作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f8fafc;
            --surface: #ffffff;
            --surface-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-tertiary: #64748b;
            --border-light: #e2e8f0;
            --accent: #2563eb;
            --accent-light: #3b82f6;
            --accent-soft: #eff6ff;
            --accent-orange: #f97316;
            --accent-orange-light: #fb923c;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --badge-bg: #f1f5f9;
        }

        body.dark {
            --bg-page: #0f172a;
            --surface: #1e293b;
            --surface-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-tertiary: #94a3b8;
            --border-light: #334155;
            --accent: #3b82f6;
            --accent-light: #60a5fa;
            --accent-soft: #1e293b;
            --accent-orange: #f97316;
            --badge-bg: #334155;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            line-height: 1.5;
            transition: background 0.2s, color 0.2s;
            scroll-behavior: smooth;
            font-size: 18px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(248, 250, 252, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            padding: 0.7rem 0;
            font-size: 0.9rem;
        }
        body.dark .navbar {
            background: rgba(15, 23, 42, 0.85);
        }
        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-weight: 700;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-orange));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            font-size: 0.9rem;
        }
        .nav-links a:hover { color: var(--accent-orange); }
        .nav-actions {
            display: flex;
            gap: 0.6rem;
            align-items: center;
        }
        .icon-btn {
            background: var(--badge-bg);
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .icon-btn:hover {
            background: var(--accent-soft);
            color: var(--accent-orange);
        }

        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            padding: 2rem 0 1rem;
        }
        .hero-left {
            flex-shrink: 0;
        }
        .hero-left h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, var(--accent), var(--accent-orange));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero-right {
            flex: 1;
        }
        .hero-right p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .hero-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 0.5rem 0;
        }
        .hero-tags .badge {
            font-size: 0.9rem;
            padding: 0.3rem 1rem;
        }
        .contact-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        .btn-primary, .btn-phone {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }
        .btn-primary:hover, .btn-phone:hover {
            background: var(--accent-orange);
            transform: scale(0.98);
        }

        .card {
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .section {
            margin: 2.5rem 0;
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            border-left: 4px solid var(--accent-orange);
            padding-left: 1rem;
        }

        .badge {
            display: inline-block;
            background: var(--badge-bg);
            padding: 0.25rem 0.8rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .skill-badge {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin: 1rem 0;
        }
        .highlight-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-orange);
        }

        .exp-item {
            margin-bottom: 2rem;
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
        }
        .exp-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }
        .exp-company {
            font-weight: 700;
            font-size: 1.2rem;
        }
        .exp-date {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        .exp-points {
            list-style: none;
            margin-left: 0;
            padding-left: 0;
        }
        .exp-points li {
            margin-bottom: 0.6rem;
            padding-left: 1.2rem;
            position: relative;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .exp-points li::before {
            content: "•";
            color: var(--accent-orange);
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        .exp-highlight {
            font-weight: 600;
            color: var(--accent-orange);
        }

        /* 轮播样式：每屏两张卡片，手机自动变为一张，无按钮 */
        .carousel {
            margin-top: 1rem;
            border-radius: 1rem;
            background: var(--badge-bg);
            padding: 0.5rem;
        }
        .carousel-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            gap: 1rem;
            padding-bottom: 0.5rem;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .carousel-slide {
            flex: 0 0 calc(50% - 0.5rem);
            scroll-snap-align: start;
            background: var(--surface-card);
            border-radius: 0.8rem;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border: 1px solid var(--border-light);
        }
        .carousel-slide .desc-text {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 8px;
            line-height: 1.3;
            word-break: break-word;
        }
        .carousel-slide img {
            max-width: 100%;
            max-height: 150px;
            object-fit: contain;
            cursor: pointer;
            border-radius: 8px;
        }

        .projects-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .project-card {
            background: var(--surface);
            border-radius: 1.25rem;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
        }
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }
        .project-header h3 {
            font-size: 1.3rem;
            margin: 0;
        }
        .project-date {
            color: var(--text-tertiary);
            font-size: 0.8rem;
        }

        /* 五张图片紧凑排列 */
        .media-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .media-item {
            flex: 1 1 18%;
            min-width: 100px;
            background: var(--badge-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.3rem;
            cursor: pointer;
        }
        .media-item img {
            width: 100%;
            max-height: 130px;
            object-fit: contain;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .media-item img:hover {
            transform: scale(1.02);
        }
        .qr-text {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-top: 0.2rem;
            text-align: center;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }
        .skill-category {
            background: var(--surface);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-light);
        }
        .skill-category h4 {
            font-size: 1rem;
            margin-bottom: 0.6rem;
            color: var(--accent-orange);
            border-left: 3px solid var(--accent-orange);
            padding-left: 0.5rem;
        }
        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .skill-tag {
            background: var(--badge-bg);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .edu-detail {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .edu-badge {
            background: var(--accent-orange);
            color: white;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
        .back-to-top {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: var(--accent-orange);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: opacity 0.2s;
            opacity: 0;
            visibility: hidden;
        }
        .back-to-top.show {
            opacity: 1;
            visibility: visible;
        }
        .back-to-top:hover {
            background: var(--accent);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
        }
        .modal-content img {
            width: auto;
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover {
            color: var(--accent-orange);
        }

        /* 手机屏幕适配：每屏一张卡片，提示文字缩小 */
        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .hero { flex-direction: column; align-items: flex-start; }
            .skills-grid { grid-template-columns: 1fr; }
            .nav-container { flex-direction: column; align-items: stretch; }
            .nav-links { justify-content: center; }
            .nav-actions { justify-content: center; }
            .media-item { flex-basis: 30%; }
            .carousel-slide { flex: 0 0 calc(100% - 0.5rem); }
            .practice-hint { font-size: 0.7rem; }
        }
    </style>
</head>

        function renderCarouselPractice(items) {
            if (!items || items.length === 0) return '';
            return `
                <div class="carousel">
                    <div class="carousel-container">
                        ${items.map(item => `
                            <div class="carousel-slide">
                                <div style="font-weight: 700; margin-bottom: 6px; color: var(--accent-orange); font-size:0.9rem;">${item.title}</div>
                                <div class="desc-text">${item.desc}</div>
                                <div style="background: var(--badge-bg); padding: 6px; border-radius: 8px; width: 100%; margin-top: 6px;">
                                    <img src="${item.imgSrc}" alt="${item.title}" onclick="openModal('${item.imgSrc}')" style="cursor:pointer;">
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function initCarousels() {
            // 无需绑定按钮，纯手势滑动，只保证滚动容器存在即可
        }

        function renderHero() {
            const emailFull = resumeData.basics.email;
            return `
                <section id="hero" class="hero">
                    <div class="hero-left"><h1>${resumeData.basics.name}</h1></div>
                    <div class="hero-right">
                        <p>${resumeData.basics.shortBio}</p>
                        <div class="hero-tags">${resumeData.basics.keywords.map(k => `<span class="badge skill-badge">#${k}</span>`).join('')}</div>
                        <div class="contact-buttons">
                            <a href="mailto:${emailFull}" class="btn-primary">📧 ${emailFull}</a>
                            <button class="btn-phone" id="callBtn">📞 ${resumeData.basics.phone}</button>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderHighlights() {
            return `
                <div class="section" id="highlights">
                    <h2 class="section-title">✨ 亮点成果</h2>
                    <div class="highlights-grid">
                        ${resumeData.highlights.map(h => `<div class="card highlight-card"><div class="highlight-number">${h.number}</div><div style="font-size: 0.9rem; color: var(--text-secondary);">${h.label}</div></div>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderInternships() {
            return `
                <div class="section" id="experience">
                    <h2 class="section-title">💼 实习经历</h2>
                    ${resumeData.internships.map(exp => `
                        <div class="exp-item">
                            <div class="exp-header"><span class="exp-company">${exp.company} · ${exp.role}</span><span class="exp-date">${exp.period}</span></div>
                            <ul class="exp-points">${exp.points.map(p => `<li class="${p.highlight ? 'exp-highlight' : ''}">${p.text}</li>`).join('')}</ul>
                            ${exp.keyPractices && exp.keyPractices.length ? `
                                <div style="margin-top:1rem;">
                                    <div style="font-weight:600; color:var(--accent-orange); font-size:0.9rem;">📌 关键提效实践</div>
                                    <div style="font-size:0.75rem; color:var(--text-tertiary); margin-bottom:0.5rem;">（手机左右滑动查看）</div>
                                    ${renderCarouselPractice(exp.keyPractices)}
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderProjects() {
            const contentProj = resumeData.projects[0];
            const otherProj = resumeData.projects[1];
            return `
                <div class="section" id="projects">
                    <h2 class="section-title">📌 项目实践</h2>
                    <div class="projects-grid">
                        <div class="project-card">
                            <div class="project-header">
                                <h3>${contentProj.name}</h3>
                                <span class="project-date">${contentProj.period}</span>
                            </div>
                            <div class="skill-tags" style="margin-bottom: 0.6rem;">
                                ${contentProj.techStack.map(t => `<span class="badge skill-badge">${t}</span>`).join('')}
                            </div>
                            <p style="font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0.8rem;">${contentProj.result}</p>
                            <div class="media-row">
                                <div class="media-item" onclick="openModal('${contentProj.wechatImages[0]}')">
                                    <img src="${contentProj.wechatImages[0]}" alt="公众号截图1">
                                </div>
                                <div class="media-item" onclick="openModal('${contentProj.wechatImages[1]}')">
                                    <img src="${contentProj.wechatImages[1]}" alt="公众号截图2">
                                </div>
                                <div class="media-item" onclick="openModal('${contentProj.xiaohongshuImages[0]}')">
                                    <img src="${contentProj.xiaohongshuImages[0]}" alt="小红书截图1">
                                </div>
                                <div class="media-item" onclick="openModal('${contentProj.xiaohongshuImages[1]}')">
                                    <img src="${contentProj.xiaohongshuImages[1]}" alt="小红书截图2">
                                </div>
                                <div class="media-item" onclick="openModal('${contentProj.qrCodeImage}')">
                                    <img src="${contentProj.qrCodeImage}" alt="公众号二维码">
                                    <div class="qr-text">扫码查看公众号</div>
                                </div>
                            </div>
                            <div style="text-align: center; margin-top: 0.8rem;">
                                <a href="${contentProj.xiaohongshuLink}" target="_blank" style="color: var(--accent-orange);">🔗 跳转小红书主页 >></a>
                            </div>
                        </div>
                        <div class="project-card">
                            <div class="project-header">
                                <h3>${otherProj.name}</h3>
                                <span class="project-date">${otherProj.period}</span>
                            </div>
                            <div class="skill-tags" style="margin-bottom: 0.6rem;">
                                ${otherProj.techStack.map(t => `<span class="badge skill-badge">${t}</span>`).join('')}
                            </div>
                            <p style="font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 0.8rem;">${otherProj.result}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSkills() {
            return `
                <div class="section" id="skills">
                    <h2 class="section-title">🧰 工具与能力</h2>
                    <div class="skills-grid">
                        <div class="skill-category"><h4>🤖 AI 工具</h4><div class="skill-tags">${resumeData.skills.ai.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                        <div class="skill-category"><h4>🎨 内容工具</h4><div class="skill-tags">${resumeData.skills.content.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                        <div class="skill-category"><h4>⚙️ 其他</h4><div class="skill-tags">${resumeData.skills.other.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div></div>
                    </div>
                </div>
            `;
        }

        function renderEducation() {
            return `
                <div class="section" id="education">
                    <h2 class="section-title">🎓 教育背景</h2>
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
                            <strong style="font-size:1.1rem;">${resumeData.education.school}</strong>
                            <span class="exp-date">${resumeData.education.period}</span>
                        </div>
                        <div style="margin: 0.3rem 0; font-size:0.95rem;">${resumeData.education.degree}</div>
                        <div class="edu-detail">
                            <span class="edu-badge">📜 ${resumeData.education.certificates}</span>
                            <span class="edu-badge">🏅 ${resumeData.education.awards}</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderFullPage() {
            const root = document.getElementById('app-root');
            if (!root) return;
            root.innerHTML = `
                ${renderHero()}
                ${renderHighlights()}
                ${renderInternships()}
                ${renderProjects()}
                ${renderSkills()}
                ${renderEducation()}
                <footer class="footer">© 2026 毛雨晴 · 最后更新 2026.04 | 数据驱动私域玩家</footer>
            `;
            const callBtn = document.getElementById('callBtn');
            if (callBtn) callBtn.onclick = () => alert("电话: 198-2260-9828");
            initCarousels();
        }

        function initFeatures() {
            const themeBtn = document.getElementById('themeToggle');
            const printBtn = document.getElementById('printBtn');
            const backBtn = document.getElementById('backToTop');
            const isDark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (isDark) document.body.classList.add('dark');
            themeBtn.onclick = () => { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light'); };
            printBtn.onclick = () => window.print();
            window.addEventListener('scroll', () => { if (window.scrollY > 300) backBtn.classList.add('show'); else backBtn.classList.remove('show'); });
            backBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelectorAll('[data-nav]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href').slice(1);
                    const target = document.getElementById(targetId);
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        renderFullPage();
        initFeatures();
    </script>
</body>
</html>
